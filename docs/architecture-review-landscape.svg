<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" role="img" aria-labelledby="title desc">
  <title id="title">Nous Architecture Review Landscape</title>
  <desc id="desc">System and code architecture review summary with continuity hierarchy and matcher-policy layer.</desc>
  <style>
    .bg { fill: #0b1020; }
    .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 18; }
    .panel2 { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 18; }
    .title { fill: #f8fafc; font: 700 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #cbd5e1; font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .heading { fill: #f8fafc; font: 700 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #e2e8f0; font: 600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .body { fill: #cbd5e1; font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tiny { fill: #94a3b8; font: 500 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .pill { stroke: none; rx: 12; }
    .strong { fill: #14532d; }
    .partial { fill: #7c2d12; }
    .gap { fill: #7f1d1d; }
    .strongText, .partialText, .gapText { fill: #f8fafc; font: 700 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .accent { fill: #38bdf8; }
    .accent2 { fill: #a78bfa; }
    .accent3 { fill: #22c55e; }
    .line { stroke: #475569; stroke-width: 2; }
    .arrow { marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="1180" />

  <text class="title" x="56" y="62">Nous Architecture Review Landscape</text>
  <text class="subtitle" x="56" y="92">2026-04-05 · Ralph review + terminology correction + matcher-governance implementation</text>

  <rect class="panel" x="40" y="122" width="740" height="450" rx="18"/>
  <text class="heading" x="66" y="160">System Architecture Review</text>
  <text class="tiny" x="66" y="184">Current reading after this slice: strong architecture direction, bounded but explicit matcher-governance follow-through.</text>

  <g transform="translate(64,210)">
    <rect class="pill strong" x="0" y="0" width="84" height="28" rx="12"/><text class="strongText" x="18" y="19">STRONG</text>
    <text class="label" x="102" y="19">North-star alignment</text>
    <text class="body" x="102" y="42">Personal-assistant primacy + local-first governance remain intact.</text>

    <rect class="pill partial" x="0" y="72" width="84" height="28" rx="12"/><text class="partialText" x="19" y="91">PARTIAL</text>
    <text class="label" x="102" y="91">User-side continuity language</text>
    <text class="body" x="102" y="114">Top-level term now moves to context continuity; work continuity stays narrower.</text>

    <rect class="pill strong" x="0" y="144" width="84" height="28" rx="12"/><text class="strongText" x="18" y="163">STRONG</text>
    <text class="label" x="102" y="163">Execution contract</text>
    <text class="body" x="102" y="186">chat / work / handoff remains explicit instead of unified-intake illusion.</text>

    <rect class="pill partial" x="0" y="216" width="84" height="28" rx="12"/><text class="partialText" x="19" y="235">PARTIAL</text>
    <text class="label" x="102" y="235">Governance + safety</text>
    <text class="body" x="102" y="258">Safety gates are explicit; provenance is still mostly rationale-string based.</text>

    <rect class="pill partial" x="0" y="288" width="84" height="28" rx="12"/><text class="partialText" x="19" y="307">PARTIAL</text>
    <text class="label" x="102" y="307">Matcher / judgment layer</text>
    <text class="body" x="102" y="330">Policy/config now exists; richer semantic evaluators remain unevenly distributed.</text>
  </g>

  <rect class="panel" x="820" y="122" width="740" height="450" rx="18"/>
  <text class="heading" x="846" y="160">Code Architecture Review</text>
  <text class="tiny" x="846" y="184">Current reading: package boundaries are healthy; judgment logic is now centralized by policy vocabulary, not by one module.</text>

  <g transform="translate(844,210)">
    <rect class="pill strong" x="0" y="0" width="84" height="28" rx="12"/><text class="strongText" x="18" y="19">STRONG</text>
    <text class="label" x="102" y="19">Responsibility boundaries</text>
    <text class="body" x="102" y="42">core/runtime/infra/orchestrator split remains legible.</text>

    <rect class="pill strong" x="0" y="72" width="84" height="28" rx="12"/><text class="strongText" x="18" y="91">STRONG</text>
    <text class="label" x="102" y="91">Contract surfaces</text>
    <text class="body" x="102" y="114">Shared matcher config now lives in @nous/core and infra config.</text>

    <rect class="pill partial" x="0" y="144" width="84" height="28" rx="12"/><text class="partialText" x="19" y="163">PARTIAL</text>
    <text class="label" x="102" y="163">Judgment logic placement</text>
    <text class="body" x="102" y="186">Still cross-cutting, but now shares one policy vocabulary.</text>

    <rect class="pill strong" x="0" y="216" width="84" height="28" rx="12"/><text class="strongText" x="18" y="235">STRONG</text>
    <text class="label" x="102" y="235">Testability</text>
    <text class="body" x="102" y="258">Policy-mode coverage now exists for interaction, context continuity, retrieval, conflict.</text>

    <rect class="pill partial" x="0" y="288" width="84" height="28" rx="12"/><text class="partialText" x="19" y="307">PARTIAL</text>
    <text class="label" x="102" y="307">Change cost</text>
    <text class="body" x="102" y="330">Continuity wording still crosses docs + runtime + infra.</text>
  </g>

  <rect class="panel2" x="40" y="610" width="740" height="250" rx="18"/>
  <text class="heading" x="66" y="648">Continuity Hierarchy</text>
  <text class="tiny" x="66" y="672">Decision: context continuity becomes the top-level term. Work continuity remains a governed execution-restoration slice.</text>

  <g transform="translate(82,708)">
    <rect x="0" y="0" width="214" height="104" rx="18" fill="#0f766e" opacity="0.92"/>
    <text class="label" x="20" y="30">Transport continuity</text>
    <text class="body" x="20" y="56">Thread / session / attach / replay</text>
    <text class="body" x="20" y="78">Communication continuity only</text>

    <rect x="250" y="0" width="214" height="104" rx="18" fill="#1d4ed8" opacity="0.92"/>
    <text class="label" x="270" y="30">Execution continuity</text>
    <text class="body" x="270" y="56">Intent / task / decision / pause</text>
    <text class="body" x="270" y="78">Work continuity lives here</text>

    <rect x="500" y="0" width="214" height="104" rx="18" fill="#7c3aed" opacity="0.92"/>
    <text class="label" x="520" y="30">Semantic continuity</text>
    <text class="body" x="520" y="56">Memory / retrieval / recall pack</text>
    <text class="body" x="520" y="78">Meaning continuity authority</text>
  </g>

  <line class="line arrow" x1="404" y1="820" x2="404" y2="886"/>
  <rect x="210" y="888" width="388" height="78" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text class="label" x="246" y="922">Context continuity</text>
  <text class="body" x="246" y="948">Top-level contract spanning transport + execution + semantic carryover.</text>

  <rect class="panel2" x="820" y="610" width="740" height="490" rx="18"/>
  <text class="heading" x="846" y="648">Matcher-Governance Layer</text>
  <text class="tiny" x="846" y="672">Shared config: packages/core/src/types/matching.ts · Runtime helper: packages/runtime/src/matching/policy.ts</text>

  <g transform="translate(848,704)">
    <rect x="0" y="0" width="308" height="110" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text class="label" x="18" y="28">Modes</text>
    <text class="body" x="18" y="54">heuristic_only</text>
    <text class="body" x="18" y="76">semantic_only</text>
    <text class="body" x="18" y="98">hybrid (strategy + thresholds + weights)</text>

    <rect x="342" y="0" width="350" height="110" rx="18" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text class="label" x="360" y="28">Live consumers</text>
    <text class="body" x="360" y="54">Interaction mode classification</text>
    <text class="body" x="360" y="76">Context continuity restoration</text>
    <text class="body" x="360" y="98">Memory retrieval · Conflict analysis · Relationship preference</text>

    <rect x="0" y="152" width="692" height="270" rx="18" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text class="label" x="18" y="182">Implementation evidence</text>
    <text class="body" x="18" y="214">• Core policy/config surface: packages/core/src/types/matching.ts</text>
    <text class="body" x="18" y="240">• Daemon config load/write: packages/infra/src/config/home.ts</text>
    <text class="body" x="18" y="266">• Interaction mode matcher + optional semantic evaluator: packages/infra/src/intake/interaction-mode-classifier.ts</text>
    <text class="body" x="18" y="292">• Context continuity restoration matcher: packages/runtime/src/memory/context-continuity.ts</text>
    <text class="body" x="18" y="318">• Retrieval scoring under configurable threshold/weights: packages/runtime/src/memory/retrieval.ts</text>
    <text class="body" x="18" y="344">• Conflict policy seam: packages/infra/src/daemon/conflict-manager.ts</text>
    <text class="body" x="18" y="370">• Relationship preference rule-family toggles: packages/infra/src/daemon/server.ts</text>
    <text class="body" x="18" y="396">• Regression coverage: interaction-mode / work-continuity / memory-retrieval / conflict-manager tests</text>
  </g>

  <rect x="40" y="1116" width="1520" height="40" rx="12" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text class="subtitle" x="58" y="1142">Review conclusion: 架构主方向正确；context continuity 成为上位概念；matcher-policy 已经落到核心契约、配置、运行时与测试层。</text>
</svg>
